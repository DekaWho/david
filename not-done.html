<!doctype html>
<html lang="es">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>⚠️ Aviso</title>

        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400..800;1,400..800&family=Kalam:wght@400;700&display=swap"
            rel="stylesheet"
        />

        <link rel="stylesheet" href="/estilos/styles.css" />

        <link
            rel="icon"
            type="image/png"
            sizes="32x32"
            href="/imgs/favicon32.png"
        />
        <link
            rel="icon"
            type="image/png"
            sizes="48x48"
            href="/imgs/favicon48.png"
        />
    </head>

    <body>
        <h1 class="titulo-breaker titulo-breaker--bg-claro" style="color: var(--rojo);">
            <img class="emoji" src="/imgs/svg/alert.svg" alt="⚠️" />
            Revisa tu email
        </h1>

        <div class="cuerpo">
            <p>
                Si no te ha llegado nada espera <strong>un minuto.</strong> La
                información que vas a leer es sumamente <s>confidencial</s> y tu
                competencia está tratando de evitarlo.
            </p>
        </div>
    </body>
</html>
